<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9d</title>
</head>
<body>
    <input placeholder="Name" class="js-name-input"
    onkeydown="
    if (event.key === 'Enter'){
        namePrinting();
    };
    "
    >
    <button onclick="
    namePrinting();
    ">Submit</button>
    <p class="js-message"></p>
    <script>
        function namePrinting(){
                    const elementname = document.querySelector('.js-name-input');
            document.querySelector('.js-message')
            .innerHTML = `Your name is: ${elementname.value}`;
                }
    </script>
</body>
</html>
